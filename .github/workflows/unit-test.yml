name: Unit Test

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  NODE_VERSION: "24.x"

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i

      - name: Run Markdown Lint
        run: pnpm run lint

  check:
    name: Check Skills
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check skills
        env:
          RUST_LOG: info
        run: cargo run --release -p skill-cli -- check
